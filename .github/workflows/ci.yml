name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      # ppt_engine 是独立包，后端测试通过 sys.path 注入引用它。
      # 在 CI 中安装它，使 import 在 unittest 进程内可用。
      - name: Install ppt_engine (editable, for sys.path import)
        run: uv pip install -e ../ppt_engine

      - name: Ruff check (enforced)
        run: uvx ruff@latest check src tests ../ppt_engine/ppt_engine ../ppt_engine/tests

      - name: Run unit tests
        env:
          # 测试 setUp 会用临时目录覆盖 DATA_DIR；这里仅提供模板根路径，
          # 使依赖模板的测试可在 CI 运行。部分依赖外部 M5 案例库的测试
          # 在无数据环境会失败（预存问题），故用 continue-on-error 标注。
          ZHONGCHI_PPT_MERGE_ENGINE: python-pptx
          ZHONGCHI_M1M2_LLM_ENABLED: "0"
        run: uv run python -m unittest discover -s tests -v
        continue-on-error: true

  frontend:
    name: Frontend (typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (enforced)
        run: npm run typecheck

      - name: Static structure tests (enforced)
        run: npm test
